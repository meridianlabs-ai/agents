name: Claude review (reusable)

# Read-only reviewer persona, separate from the dev agent in claude.yml.
# Posts PR review comments but has no write access to contents — it cannot
# push commits or open PRs (enforced by job permissions, not just the prompt).
# Same WIF auth as the dev agent. Callers add a stub (see
# examples/claude-review-stub.yml) that triggers on pull_request events
# (auto-review) and/or @review comments.
#
# Auto-review-on-open only fires where this workflow file exists on the PR's
# base branch (GitHub resolves pull_request-family workflows from the PR's
# branches, not the default branch). On a pristine-base mirror like the
# inspect_ai fork — whose PRs target an upstream-mirror `main` that has no
# meridian workflows — pull_request never fires; only the @review comment path
# (issue_comment, resolved from the default branch) works there. See README.
#
# Callers MUST grant id-token: write at the calling job level (GitHub does not
# pass id-token to reusable workflows implicitly).

on:
  workflow_call:
    inputs:
      review_prompt:
        description: Instruction given to the reviewer.
        required: false
        type: string
        default: >-
          Review this pull request. Focus on correctness bugs, security
          issues, and clear simplification or reuse opportunities. Be
          comprehensive within this single review: report every finding you are
          confident about in one pass — including minor and non-blocking nits —
          rather than surfacing one issue at a time, so the author can address
          them together in a single round. Still hold a high-confidence bar: do
          NOT pad the review with speculative or marginal guesses. You may run
          the test suite, ruff, and mypy to verify a finding before reporting
          it. This is a read-only review: do NOT modify code or push commits.
          You MUST post your review to the PR — it is not surfaced anywhere
          else. Post a concise top-level summary with `gh pr comment` (whether
          or not you found issues), and add inline comments for specific
          line-level findings. THEN, as your final action, post a SEPARATE
          standalone comment with a single `gh pr comment --body` call — post it
          in one call and do NOT edit it afterward. Its body must be EXACTLY one
          of these two lines, chosen by whether you are asking the author to
          change ANYTHING:
          (a) if you have NO outstanding suggestions at all — no blocking issues
          and no non-blocking nits, nothing you want changed:
          `🔎 Review complete — no outstanding suggestions. <!-- claude-review-summary --><!-- claude-review-verdict:clean -->`
          (b) otherwise — you raised anything actionable, even a single minor or
          explicitly non-blocking nit:
          `🔎 Review complete. <!-- claude-review-summary --><!-- claude-review-verdict:suggestions -->`
          (The trailing HTML comments are markers the @auto loop keys on:
          `claude-review-summary` fires the loop; `claude-review-verdict` tells it
          whether the PR has converged — `clean` hands off to a human, `suggestions`
          spends a fix round. They must be present in the body as first posted,
          since a comment built up via edits would not carry them in the `created`
          event. Keep the visible text neutral — do NOT mention @auto, so it
          doesn't read as if @auto is acting on PRs that aren't `auto`-labeled.)
          For a normal PR this is just a short "review complete" note.
      model:
        description: Preferred model (--model). Empty = Claude Code default.
        required: false
        type: string
        default: "fable"
      fallback_model:
        description: Fallback when the preferred model is unavailable.
        required: false
        type: string
        default: "default"
      settings:
        description: >-
          Claude Code settings JSON (inline). Allows the verify loop (tests +
          type/lint, both python/python3 forms) and posting the review (gh +
          inline-comment MCP), and DENIES file mutation and git writes. The
          deny overlay makes read-only intent explicit; the real boundary is
          the job's contents:read token, which can't push regardless. deny
          beats allow, so it holds even against any claude_args override.
        required: false
        type: string
        default: >-
          {"permissions":{
          "allow":["Read","Bash(pytest:*)","Bash(ruff:*)","Bash(mypy:*)","Bash(pyright:*)",
          "Bash(pip:*)","Bash(pip3:*)","Bash(uv:*)","Bash(python:*)",
          "Bash(python3:*)","Bash(gh:*)","mcp__github_inline_comment"],
          "deny":["Edit","Write","Bash(git push:*)","Bash(git commit:*)"]}}
      claude_args:
        description: Additional CLI arguments passed through to Claude Code.
        required: false
        type: string
        default: ""
      append_system_prompt:
        description: >-
          Repo-specific guidance appended to the review prompt (via
          --append-system-prompt, so it adds to — not replaces — review_prompt).
          Empty by default; the inspect_ai fork uses it to tell reviewers that
          inline review-comment replies don't reach the dev agent on that repo
          (pristine-main; see README → The inspect_ai fork), so users must act on
          findings with a top-level @claude comment.
        required: false
        type: string
        default: ""
      allowed_bots:
        description: >-
          Comma-separated bot logins whose events may trigger the reviewer, or
          "*" for all. Empty by default, which means claude-code-action rejects
          ALL bot-authored events (its checkHumanActor runs even in prompt/agent
          mode). The fork sets "claude[bot]" so the dev agent can kick off a
          review by posting a top-level @review comment when it opens a PR —
          auto-review-on-open can't fire there (the workflow isn't on the PR's
          base branch). Keep this empty on the dev workflow: allowing bots there
          would let the reviewer's own comments retrigger the dev agent.
        required: false
        type: string
        default: ""
    secrets:
      MARVIN_TOKEN:
        description: >-
          Machine-account PAT, consumed ONLY by the deterministic ack/stage
          steps below (👀 reaction on the @review comment; board stage →
          Agent Working while the review runs) — it is NEVER handed to
          claude-code-action, so the review agent itself stays read-only (app
          token + contents:read). Optional: absent, those steps no-op and the
          reviewer behaves exactly as before.
        required: false

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read          # read code to review; cannot push
      pull-requests: write    # post review + inline comments
      issues: read
      id-token: write         # WIF auth
      actions: read
    steps:
      # Ack + stage run BEFORE the checkout (no workspace needed; the clone
      # costs ~1 min on large repos and the 👀 should land in seconds).
      # Word-boundary gate for comment events so a summary that merely quotes
      # `@review` in backticks doesn't ack; pull_request events (auto-review on
      # open/ready) always count. Marvin's own loop-posted @review DOES get the
      # ack — it doubles as "reviewer engaged" observability.
      - name: Check trigger (ack/stage gating)
        id: trig
        env:
          EVENT: ${{ github.event_name }}
          COMMENT: ${{ github.event.comment.body }}
        run: |
          ok=false
          if [ "$EVENT" = "pull_request" ]; then
            ok=true
          elif printf '%s' "$COMMENT" | grep -qE '(^|[[:space:]])@review([[:space:],.!?;:]|$)'; then
            ok=true
          fi
          echo "ok=$ok" >>"$GITHUB_OUTPUT"

      - name: Acknowledge trigger (eyes)
        if: steps.trig.outputs.ok == 'true' && github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ secrets.MARVIN_TOKEN }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          [ -n "$GH_TOKEN" ] || { echo "no MARVIN_TOKEN; skipping ack"; exit 0; }
          gh api "repos/$REPO/issues/comments/$COMMENT_ID/reactions" -f content=eyes --silent || true

      # The @review loop is part of Agent Working (design/atlas-tracking.md):
      # a review starting means the automated machinery is engaged again, so
      # move the issue immediately rather than waiting for the review-fix
      # round. Idempotent; resolves the PR to its issue via branch/Fixes; the
      # set-stage action no-ops without the token.
      - name: Stage - Agent Working (review running)
        if: steps.trig.outputs.ok == 'true'
        uses: meridianlabs-ai/agents/.github/actions/set-stage@main
        with:
          stage: Agent Working
          token: ${{ secrets.MARVIN_TOKEN }}
          repo: ${{ github.repository }}
          issue: ${{ github.event.issue.number || github.event.pull_request.number }}

      # On a pull_request event the default checkout is the PR merge ref. On an
      # @review comment (issue_comment) the default would be the repo default
      # branch, so resolve the PR head explicitly.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/head', github.event.issue.number) || '' }}

      # Provision the project environment so the agent's allow-listed
      # pytest/ruff/mypy can actually run, instead of falling back to py_compile
      # and reasoning. Convention-based opt-in: a caller repo adds a
      # `.github/actions/claude-setup` composite action that delegates to its
      # existing, cache-backed CI setup; the GitHub cache is the caller's, so it
      # hits the entries normal CI populates. `./` resolves against the
      # checked-out workspace. The hashFiles guard makes this a no-op for repos
      # that don't define it. Fatal on failure. NOTE: the reviewer checks out
      # the PR head (above), so on the inspect_ai fork — whose PR branches are
      # cut from pristine main and carry no meridian files — the action is
      # absent and this is skipped; see design/architecture.md.
      - name: Provision project environment
        if: hashFiles('.github/actions/claude-setup/action.yml', '.github/actions/claude-setup/action.yaml') != ''
        uses: ./.github/actions/claude-setup

      - uses: anthropics/claude-code-action@v1
        id: claude
        with:
          anthropic_federation_rule_id: fdrl_01GpNgJm9jE6ZfvcqoJYQL2Y
          anthropic_organization_id: be5d0086-bc43-45d2-9184-20ecdd647aa7
          anthropic_service_account_id: svac_01RL4wYD7ikbypwYKf4wFojv
          anthropic_workspace_id: wrkspc_01RKCQ5DTPBatQ7kHLkaEueD
          prompt: ${{ inputs.review_prompt }}
          settings: ${{ inputs.settings }}
          allowed_bots: ${{ inputs.allowed_bots }}
          claude_args: >-
            ${{ inputs.model != '' && format('--model {0}', inputs.model) || '' }}
            ${{ inputs.model != '' && inputs.fallback_model != '' && format('--fallback-model {0}', inputs.fallback_model) || '' }}
            ${{ inputs.append_system_prompt != '' && format('--append-system-prompt {0}', toJSON(inputs.append_system_prompt)) || '' }}
            ${{ inputs.claude_args }}

      # Surface agent errors the action swallows (e.g. a model overload/529 or a
      # model 404), which otherwise leave the run green with no review posted.
      - name: Surface agent errors
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EXEC: ${{ steps.claude.outputs.execution_file }}
          CLAUDE_OUTCOME: ${{ steps.claude.outcome }}
          NUM: ${{ github.event.issue.number || github.event.pull_request.number }}
        run: |
          set -uo pipefail
          file="${EXEC:-/home/runner/work/_temp/claude-execution-output.json}"
          err=""
          [ -f "$file" ] && err=$(jq -r '(if type=="array" then . else .messages end) | map(select(.type=="result" and .is_error==true)) | last | .result // empty' "$file" 2>/dev/null || true)
          if [ -z "$err" ] && [ "$CLAUDE_OUTCOME" = "failure" ]; then
            err="the review step failed before producing a result (see the job logs)."
          fi
          [ -z "$err" ] && { echo "No agent error detected."; exit 0; }
          echo "::error::Review did not complete: $err"
          if [ -n "${NUM:-}" ]; then
            gh issue comment "$NUM" --repo "$REPO" --body "$(printf '⚠️ The @review run did not complete — it errored before finishing:\n\n> %s\n\nUsually transient (model API capacity/overload). Re-trigger with @review; if it persists see https://status.claude.com.' "$err")" || true
          fi
          exit 1

      - name: Upload execution log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-review-execution-output
          path: /home/runner/work/_temp/claude-execution-output.json
          if-no-files-found: ignore
