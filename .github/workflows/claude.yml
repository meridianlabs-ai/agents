name: Claude (reusable)

# Reusable workflow wrapping anthropics/claude-code-action.
# Caller repos add a thin stub (see examples/claude-stub.yml) and inherit
# all configuration from here, so trigger/config changes happen in one place.
#
# Auth uses Anthropic Workload Identity Federation: each run exchanges the
# GitHub OIDC token for a short-lived Anthropic credential scoped to the
# meridian service account/workspace. No secrets required — but callers MUST
# grant `id-token: write` at the calling job level (GitHub does not pass
# id-token to reusable workflows implicitly).
#
# Note: GitHub does not issue OIDC tokens to workflows triggered by PRs from
# forks, so fork PRs cannot authenticate. All triggers in the stub run in the
# base-repo context, so this only matters if a caller adds pull_request
# triggers of its own.

on:
  workflow_call:
    inputs:
      trigger_phrase:
        description: Comment phrase that triggers Claude
        required: false
        type: string
        default: "@claude"
      label_trigger:
        description: Issue label that triggers Claude
        required: false
        type: string
        default: "claude"
      claude_args:
        description: Additional CLI arguments passed through to Claude Code
        required: false
        type: string
        default: ""
      model:
        description: >-
          Preferred model, passed to Claude Code as --model (empty = Claude
          Code's own default). Defaults to the Fable alias for all meridian
          repos. claude-code-action@v1 has no first-class model input, so this
          is spliced into claude_args.
        required: false
        type: string
        default: "fable"
      fallback_model:
        description: >-
          Model used when the preferred model is overloaded or unavailable
          (e.g. retired), passed as --fallback-model. "default" expands to the
          account default, so the Fable-preferred default degrades gracefully
          if Fable is gone. Pass "" to disable fallback. Ignored when model is
          empty.
        required: false
        type: string
        default: "default"
      settings:
        description: >-
          Claude Code settings JSON (inline). Owns the permission allow-list:
          file edits + the verify loop (both python/python3 forms) + gh for PR
          creation and CI reads + a scoped git allow-list so the agent can sync
          its working branch with the base branch (fetch/merge/rebase/push) and
          inspect history. Additive to the action's defaults; headless runs
          auto-deny anything not allowed, which keeps arbitrary execution off
          the table for workflows triggered by public issue content. git is
          scoped to branch-sync + read-only subcommands, not blanket git:*; the
          job's contents:write token is the real privilege boundary, and the
          fork's branch protection still blocks force-push to main/meridian.
        required: false
        type: string
        default: >-
          {"permissions":{"allow":["Read","Edit","Write",
          "Bash(pytest:*)","Bash(ruff:*)","Bash(mypy:*)","Bash(pip:*)",
          "Bash(pip3:*)","Bash(uv:*)","Bash(python:*)","Bash(python3:*)",
          "Bash(gh:*)",
          "Bash(git fetch:*)","Bash(git merge:*)","Bash(git rebase:*)",
          "Bash(git push:*)","Bash(git checkout:*)","Bash(git switch:*)",
          "Bash(git branch:*)","Bash(git status:*)","Bash(git log:*)",
          "Bash(git diff:*)","Bash(git show:*)","Bash(git rev-parse:*)",
          "Bash(git remote:*)"]}}
      base_branch:
        description: >-
          Base branch for branches/PRs Claude creates (defaults to the repo's
          default branch). Used by the inspect_ai fork to target pristine main
          rather than the meridian default branch.
        required: false
        type: string
        default: ""
      branch_sync_prompt:
        description: >-
          Guidance appended to the system prompt (via --append-system-prompt,
          so it adds to — not replaces — the comment-derived task) ONLY on
          follow-up runs that continue an existing branch, i.e. when the
          trigger is on a PR. Fresh runs from an issue create a new branch off
          the (hourly-synced) base, so no merge is needed and this is skipped.
          Pass "" to disable.
        required: false
        type: string
        default: >-
          You are continuing work on an existing branch. Before making any code
          changes, bring it up to date with its base branch: fetch the base
          branch and merge it into this branch, resolving any conflicts, so your
          changes and their tests run against current code — then include that
          merge when you push. The checkout has full history (fetch-depth 0),
          so a local merge works without extra fetching depth.
      append_system_prompt:
        description: >-
          Repo-specific guidance appended to the system prompt (via
          --append-system-prompt, so it adds to — not replaces — the
          comment-derived task) on EVERY dev run. Empty by default: this is the
          channel for caller-specific conventions a shared default can't carry
          — e.g. the inspect_ai fork's stub sets it with CHANGELOG.md rules.
          (The fork can't ship a CLAUDE.md/AGENTS.md file: main must stay
          pristine and a file on meridian isn't present on the main-cut branches
          the agent works from — see design/shared-instructions.md.) Distinct
          from branch_sync_prompt, which is gated to PR follow-up runs.
        required: false
        type: string
        default: ""

jobs:
  claude:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      # Full history + tags: setuptools-scm versioning needs tags, and Claude
      # uses git log/blame to understand code. Costs ~1 min on large repos.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Compose the two appended-system-prompt sources into ONE value, so we
      # emit a single --append-system-prompt flag. Two flags would force a bet
      # on undocumented CLI behavior (accumulate vs. last-one-wins), and they
      # co-occur on PR follow-ups (branch_sync_prompt fires there, and
      # append_system_prompt fires on every run). branch_sync_prompt is gated
      # to PR context here (issue comment on a PR, or a review/review-comment
      # event); fresh issue runs branch off the synced base and skip it. Joined
      # on one line so the toJSON splice below stays a clean single-quoted arg
      # (a newline would survive toJSON as a literal \n in the shell-parsed args).
      - name: Compose appended system prompt
        id: sysprompt
        env:
          BRANCH_SYNC: ${{ (github.event.issue.pull_request != '' || github.event.pull_request != '') && inputs.branch_sync_prompt || '' }}
          EXTRA: ${{ inputs.append_system_prompt }}
        run: |
          combined="$BRANCH_SYNC"
          if [ -n "$EXTRA" ]; then
            combined="${combined:+$combined }$EXTRA"
          fi
          echo "value=$combined" >> "$GITHUB_OUTPUT"

      - uses: anthropics/claude-code-action@v1
        id: claude
        with:
          anthropic_federation_rule_id: fdrl_01GpNgJm9jE6ZfvcqoJYQL2Y
          anthropic_organization_id: be5d0086-bc43-45d2-9184-20ecdd647aa7
          anthropic_service_account_id: svac_01RL4wYD7ikbypwYKf4wFojv
          anthropic_workspace_id: wrkspc_01RKCQ5DTPBatQ7kHLkaEueD
          trigger_phrase: ${{ inputs.trigger_phrase }}
          label_trigger: ${{ inputs.label_trigger }}
          base_branch: ${{ inputs.base_branch }}
          settings: ${{ inputs.settings }}
          claude_args: >-
            ${{ inputs.model != '' && format('--model {0}', inputs.model) || '' }}
            ${{ inputs.model != '' && inputs.fallback_model != '' && format('--fallback-model {0}', inputs.fallback_model) || '' }}
            ${{ steps.sysprompt.outputs.value != '' && format('--append-system-prompt {0}', toJSON(steps.sysprompt.outputs.value)) || '' }}
            ${{ inputs.claude_args }}

      - name: Upload execution log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-execution-output
          path: /home/runner/work/_temp/claude-execution-output.json
          if-no-files-found: ignore
