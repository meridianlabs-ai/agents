name: Claude (reusable)

# Reusable workflow wrapping anthropics/claude-code-action.
# Caller repos add a thin stub (see examples/claude-stub.yml) and inherit
# all configuration from here, so trigger/config changes happen in one place.
#
# Auth uses Anthropic Workload Identity Federation: each run exchanges the
# GitHub OIDC token for a short-lived Anthropic credential scoped to the
# meridian service account/workspace. No secrets required — but callers MUST
# grant `id-token: write` at the calling job level (GitHub does not pass
# id-token to reusable workflows implicitly).
#
# Note: GitHub does not issue OIDC tokens to workflows triggered by PRs from
# forks, so fork PRs cannot authenticate. All triggers in the stub run in the
# base-repo context, so this only matters if a caller adds pull_request
# triggers of its own.

on:
  workflow_call:
    inputs:
      trigger_phrase:
        description: Comment phrase that triggers Claude
        required: false
        type: string
        default: "@claude"
      label_trigger:
        description: Issue label that triggers Claude
        required: false
        type: string
        default: "claude"
      claude_args:
        description: Additional CLI arguments passed through to Claude Code
        required: false
        type: string
        default: ""
      model:
        description: >-
          Preferred model, passed to Claude Code as --model (empty = Claude
          Code's own default). Defaults to the Fable alias for all meridian
          repos. claude-code-action@v1 has no first-class model input, so this
          is spliced into claude_args.
        required: false
        type: string
        default: "fable"
      fallback_model:
        description: >-
          Model used when the preferred model is overloaded or unavailable
          (e.g. retired), passed as --fallback-model. "default" expands to the
          account default, so the Fable-preferred default degrades gracefully
          if Fable is gone. Pass "" to disable fallback. Ignored when model is
          empty.
        required: false
        type: string
        default: "default"
      settings:
        description: >-
          Claude Code settings JSON (inline). Owns the permission allow-list:
          file edits + the verify loop (both python/python3 forms) + gh for PR
          creation and CI reads + a scoped git allow-list so the agent can sync
          its working branch with the base branch (fetch/merge/rebase/push) and
          inspect history. Additive to the action's defaults; headless runs
          auto-deny anything not allowed, which keeps arbitrary execution off
          the table for workflows triggered by public issue content. git is
          scoped to branch-sync + read-only subcommands, not blanket git:*; the
          job's contents:write token is the real privilege boundary, and the
          fork's branch protection still blocks force-push to main/meridian.
        required: false
        type: string
        default: >-
          {"permissions":{"allow":["Read","Edit","Write",
          "Bash(pytest:*)","Bash(ruff:*)","Bash(mypy:*)","Bash(pyright:*)","Bash(pip:*)",
          "Bash(pip3:*)","Bash(uv:*)","Bash(python:*)","Bash(python3:*)",
          "Bash(gh:*)",
          "Bash(git fetch:*)","Bash(git merge:*)","Bash(git rebase:*)",
          "Bash(git push:*)","Bash(git checkout:*)","Bash(git switch:*)",
          "Bash(git branch:*)","Bash(git status:*)","Bash(git log:*)",
          "Bash(git diff:*)","Bash(git show:*)","Bash(git rev-parse:*)",
          "Bash(git remote:*)",
          "Bash(git add:*)","Bash(git commit:*)","Bash(git config:*)"]}}
      base_branch:
        description: >-
          Base branch for branches/PRs Claude creates (defaults to the repo's
          default branch). Used by the inspect_ai fork to target pristine main
          rather than the meridian default branch.
        required: false
        type: string
        default: ""
      request_review_after_open:
        description: >-
          After opening/adopting an issue-triggered PR and applying the `auto`
          label, post an `@review` comment to start the reviewer. Set "true"
          only where auto-review-on-open does not fire — i.e. the inspect_ai
          fork, whose `pull_request` events never reach the workflow. Doing it
          here (deterministically, AFTER labeling) instead of from the agent's
          prompt closes a race: the agent used to post `@review` mid-run, before
          the post-step applied the label, so a fast review could post its
          summary while the PR was still unlabeled and the review-fix loop would
          skip it. Leave "false" on repos where PR-open auto-review already fires
          (posting @review here would double-review).
        required: false
        type: string
        default: "false"
      branch_sync_prompt:
        description: >-
          Guidance appended to the system prompt (via --append-system-prompt,
          so it adds to — not replaces — the comment-derived task) ONLY on
          follow-up runs that continue an existing branch, i.e. when the
          trigger is on a PR. Fresh runs from an issue create a new branch off
          the (hourly-synced) base, so no merge is needed and this is skipped.
          Pass "" to disable.
        required: false
        type: string
        default: >-
          You are continuing work on an existing branch. Before making any code
          changes, bring it up to date with its base branch: fetch the base
          branch and merge it into this branch, resolving any conflicts, so your
          changes and their tests run against current code — then include that
          merge when you push. The checkout has full history (fetch-depth 0),
          so a local merge works without extra fetching depth.
      branch_sync_append:
        description: >-
          Caller-specific guidance appended to branch_sync_prompt (not
          replacing it), so a repo can add to the shared base-sync instruction
          without copying it. Same gating as branch_sync_prompt — only on PR
          follow-up runs. Empty by default; e.g. the inspect_ai fork adds its
          CHANGELOG-merge check here.
        required: false
        type: string
        default: ""
      append_system_prompt:
        description: >-
          Repo-specific guidance appended to the system prompt (via
          --append-system-prompt, so it adds to — not replaces — the
          comment-derived task) on EVERY dev run. Empty by default: this is the
          channel for caller-specific conventions a shared default can't carry
          — e.g. the inspect_ai fork's stub sets it with CHANGELOG.md rules.
          (The fork can't ship a CLAUDE.md/AGENTS.md file: main must stay
          pristine and a file on meridian isn't present on the main-cut branches
          the agent works from — see design/shared-instructions.md.) Distinct
          from branch_sync_prompt, which is gated to PR follow-up runs.
        required: false
        type: string
        default: ""
    secrets:
      MARVIN_TOKEN:
        description: >-
          Machine-account (marvin@meridianlabs.ai) fine-grained PAT. Optional;
          stubs pass it explicitly via a one-key `secrets:` map (not `secrets:
          inherit`, which would expose every caller secret to this @main-pinned
          workflow — this is the only secret consumed). When present it's handed to
          claude-code-action as github_token, so the agent acts as the machine
          account: its branch pushes and the PR the post-step opens then trigger
          CI and @review, which a GITHUB_TOKEN-authored PR cannot (GitHub's
          recursion guard). The action also does NOT revoke a caller-provided
          token, so the post-step can reuse it to open the PR deterministically.
          When absent, the dev agent still works via the Claude App token but
          issue-triggered PR creation degrades (no CI; blocked entirely where
          Actions-PR-creation is disallowed). This is the identity layer for
          @auto; model auth stays Workload Identity Federation regardless. See
          design/auto-agent.md.
        required: false

jobs:
  claude:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      # Full history + tags: setuptools-scm versioning needs tags, and Claude
      # uses git log/blame to understand code. Costs ~1 min on large repos.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Atlas stage tracking must NOT trust the stub's cheap substring gate:
      # reviewer summaries legitimately contain a backticked `@claude` ("reply
      # with a top-level @claude comment"), which starts this workflow even
      # though claude-code-action then declines (word-boundary check + bot
      # actor). Without this pre-check those phantom runs flipped issues to
      # Human Review after every review round. Mirror the action's word-boundary
      # trigger match and bot-actor rejection; only stage when it passes.
      - name: Check trigger (stage gating)
        id: trig
        env:
          PHRASE: ${{ inputs.trigger_phrase }}
          LABEL: ${{ inputs.label_trigger }}
          EVENT: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          ACTOR: ${{ github.actor }}
          COMMENT: ${{ github.event.comment.body }}
          REVIEW: ${{ github.event.review.body }}
          IBODY: ${{ github.event.issue.body }}
          ITITLE: ${{ github.event.issue.title }}
          LNAME: ${{ github.event.label.name }}
        run: |
          ok=false
          case "$ACTOR" in
            *"[bot]"|i-am-marvin) ;; # bot/machine actors never stage
            *)
              text="$COMMENT$REVIEW"
              if [ "$EVENT" = "issues" ]; then
                text="$IBODY
          $ITITLE"
              fi
              esc=$(printf '%s' "$PHRASE" | sed 's/[.[\*^$()+?{|]/\\&/g')
              printf '%s' "$text" | grep -qE "(^|[[:space:]])$esc([[:space:],.!?;:]|$)" && ok=true
              [ "$EVENT" = "issues" ] && [ "$EVENT_ACTION" = "labeled" ] && [ "$LNAME" = "$LABEL" ] && ok=true
              ;;
          esac
          echo "trigger check for stage tracking: ok=$ok"
          echo "ok=$ok" >>"$GITHUB_OUTPUT"

      # Atlas tracking (design/atlas-tracking.md): the agent is picking this
      # issue up, so move it to Agent Working. Best-effort — the action never
      # fails the run. On PR-context events the PR resolves to its issue via
      # the claude/issue-N-* branch (then a Fixes ref).
      - name: Stage - Agent Working
        if: steps.trig.outputs.ok == 'true'
        uses: meridianlabs-ai/agents/.github/actions/set-stage@main
        with:
          stage: Agent Working
          token: ${{ secrets.MARVIN_TOKEN }}
          repo: ${{ github.repository }}
          issue: ${{ github.event.issue.number || github.event.pull_request.number }}

      # Provision the project environment so the agent's allow-listed
      # pytest/ruff/mypy can actually run (a bare runner has neither the deps
      # nor the package installed). Convention-based opt-in: a caller repo adds
      # a `.github/actions/claude-setup` composite action that delegates to its
      # existing, cache-backed CI setup — no install command is duplicated here,
      # and the GitHub cache is the caller's (scoped to the run's repo), so it
      # hits the same entries normal CI populates. `./` resolves against the
      # checked-out workspace (the caller repo), not this workflow's repo. The
      # hashFiles guard makes this a no-op for repos that don't define it.
      # Fatal on failure: a broken setup surfaces loudly rather than silently
      # degrading to static-only checks. See design/architecture.md.
      - name: Provision project environment
        if: hashFiles('.github/actions/claude-setup/action.yml', '.github/actions/claude-setup/action.yaml') != ''
        uses: ./.github/actions/claude-setup

      # Compose the appended-system-prompt sources into ONE value, so we emit a
      # single --append-system-prompt flag. Multiple flags would force a bet on
      # undocumented CLI behavior (accumulate vs. last-one-wins), and the sources
      # co-occur on PR follow-ups (branch_sync_prompt + review_etiquette fire
      # there, and append_system_prompt fires on every run). The PR-gated sources
      # (branch_sync_prompt, review_etiquette) are on for any PR-context event
      # (issue comment on a PR, or a review/review-comment event); fresh issue
      # runs branch off the synced base and skip them. Joined on one line so the
      # toJSON splice below stays a clean single-quoted arg (a newline would
      # survive toJSON as a literal \n in the shell-parsed args).
      #
      # REVIEW_ETIQUETTE mirrors the @auto review-fix loop's thread-resolution
      # rule (claude-auto-review.yml): the dev agent is regularly invoked to
      # address PR review comments (directly via @claude, or — as after an @auto
      # escalation — because a handoff comment re-trips the kickoff gate), and
      # without this it fixes the code but leaves the review thread open. gh api
      # graphql is covered by the settings allow-list (Bash(gh:*)).
      #
      # REQUEST_REVIEW closes the loop when @auto is invoked on an *existing* PR
      # (e.g. "@auto fix the review issue"): the kickoff runs this dev agent,
      # which fixes and pushes — but the reviewer never re-runs on its own (no
      # auto-review on push; on the fork the pull_request family doesn't fire at
      # all), so without an explicit @review the loop stalls until a human asks.
      # Gated to the @auto trigger (autonomous intent) so a plain @claude PR tweak
      # doesn't spawn an unasked review, and to PR context (the issue->PR-open
      # case posts @review from the Open-or-adopt post-step instead, via
      # request_review_after_open, so it lands after the label).
      - name: Compose appended system prompt
        id: sysprompt
        env:
          BRANCH_SYNC: ${{ (github.event.issue.pull_request != '' || github.event.pull_request != '') && inputs.branch_sync_prompt || '' }}
          BRANCH_SYNC_APPEND: ${{ (github.event.issue.pull_request != '' || github.event.pull_request != '') && inputs.branch_sync_append || '' }}
          REVIEW_ETIQUETTE: "${{ (github.event.issue.pull_request != '' || github.event.pull_request != '') && 'When your task involves addressing inline pull-request review comments, resolve each review thread you fully address in code so settled feedback is visibly closed: query repository.pullRequest.reviewThreads via gh api graphql to get each thread id, then call the resolveReviewThread GraphQL mutation with that id. Reply with a brief rationale to, and leave unresolved, any comment you deliberately decline; never resolve a thread you did not actually address.' || '' }}"
          REQUEST_REVIEW: "${{ (github.event.issue.pull_request != '' || github.event.pull_request != '') && inputs.trigger_phrase == '@auto' && 'This is an autonomous run on an existing pull request. If your work pushed any new commit to the PR, finish by posting a top-level comment of exactly @review so the automated reviewer re-runs — it does not run automatically on push. Do not post it if you made no code changes.' || '' }}"
          EXTRA: ${{ inputs.append_system_prompt }}
        run: |
          combined=""
          for part in "$BRANCH_SYNC" "$BRANCH_SYNC_APPEND" "$REVIEW_ETIQUETTE" "$REQUEST_REVIEW" "$EXTRA"; do
            [ -n "$part" ] && combined="${combined:+$combined }$part"
          done
          echo "value=$combined" >> "$GITHUB_OUTPUT"

      # @auto invoked on an *existing* PR (e.g. "@auto fix the review issue"):
      # opt that PR into the loop by applying the `auto` label. The review-fix
      # loop (claude-auto-review.yml) gates on this label. Applied BEFORE the
      # agent runs (not in a post-step) so the label is in place before the
      # agent posts its @review — otherwise a fast reviewer could post its
      # summary while the PR is still unlabeled and the loop would skip it (the
      # same race the issue->PR path avoids via request_review_after_open). The
      # PR already exists here, so we can label it up front. Gated to the @auto
      # trigger: a write-access human typing @auto is exactly the opt-in the
      # label represents (a plain @claude PR run stays one-shot).
      # github.event.issue.number is the PR number on a PR comment. Idempotent;
      # adding a label fires no workflow here (no stub triggers on pull_request
      # `labeled`), so no recursion. Remove the label to disengage.
      - name: Opt existing PR into the @auto loop
        if: >-
          github.event.issue.pull_request != '' &&
          inputs.trigger_phrase == '@auto'
        env:
          GH_TOKEN: ${{ secrets.MARVIN_TOKEN || github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.issue.number }}
          AUTO_LABEL: "auto"
        run: |
          set -euo pipefail
          gh pr edit "$PR" --repo "$REPO" --add-label "$AUTO_LABEL" \
            && echo "Opted PR #$PR into the @auto loop (added '$AUTO_LABEL')." \
            || echo "Could not add '$AUTO_LABEL' to PR #$PR (label missing or no perms); continuing."
          # Explicit re-engagement resets the @auto budgets. A human typing @auto
          # to continue a PR that already hit the cap should get a FRESH set of
          # rounds — otherwise the leftover count in the sticky marker (e.g. "10
          # (cap 10)") makes the very next review re-escalate immediately, so the
          # loop only manages the single kickoff fix and stops (see inspect_ai#53).
          # Reset both sticky counters so the next review round starts at 1 and the
          # CI-fixer gets its full attempt budget again; the reset body carries no
          # "rounds:"/"attempts:" number, so each gate reads 0 and the record step
          # re-initialises the marker. Dropping the stored auto-review-head also
          # re-baselines the no-progress check. Best-effort; never fail the run.
          for marker in "<!-- auto-review-rounds -->" "<!-- auto-fix-attempts -->"; do
            cid=$(gh api "repos/$REPO/issues/$PR/comments" --paginate \
                    --jq 'map(select(.body|contains("'"$marker"'"))) | last | .id // empty' 2>/dev/null || true)
            [ -z "$cid" ] && continue
            gh api -X PATCH "repos/$REPO/issues/comments/$cid" -f body="$marker
          🤖 auto counters reset on re-engagement — fresh cap." --silent \
              && echo "Reset counter: $marker" || true
          done

      - uses: anthropics/claude-code-action@v1
        id: claude
        with:
          anthropic_federation_rule_id: fdrl_01GpNgJm9jE6ZfvcqoJYQL2Y
          anthropic_organization_id: be5d0086-bc43-45d2-9184-20ecdd647aa7
          anthropic_service_account_id: svac_01RL4wYD7ikbypwYKf4wFojv
          anthropic_workspace_id: wrkspc_01RKCQ5DTPBatQ7kHLkaEueD
          trigger_phrase: ${{ inputs.trigger_phrase }}
          label_trigger: ${{ inputs.label_trigger }}
          base_branch: ${{ inputs.base_branch }}
          # Machine-account identity (empty falls back to the Claude App token).
          # Passing it also stops the action revoking it, so the post-step below
          # can reuse the same live token to open the PR. See secrets.MARVIN_TOKEN.
          github_token: ${{ secrets.MARVIN_TOKEN }}
          settings: ${{ inputs.settings }}
          claude_args: >-
            ${{ inputs.model != '' && format('--model {0}', inputs.model) || '' }}
            ${{ inputs.model != '' && inputs.fallback_model != '' && format('--fallback-model {0}', inputs.fallback_model) || '' }}
            ${{ steps.sysprompt.outputs.value != '' && format('--append-system-prompt {0}', toJSON(steps.sysprompt.outputs.value)) || '' }}
            ${{ inputs.claude_args }}

      # On issue triggers claude-code-action pushes a branch but usually only
      # posts a prefilled "Create PR" link rather than opening the PR — its
      # built-in flow tends to win over any --append-system-prompt nudge to run
      # `gh pr create`. So open the PR here deterministically. The exception: a
      # multi-step task ("open a PR and follow it through") can have the agent
      # run `gh pr create` itself — and this is the norm on the fork, whose
      # appended prompt mandates it — so by the time this step runs the PR may
      # already exist. Either way this step must reach the labeling below: adopt
      # the existing PR or open one, then propagate the `auto` label. (Original
      # bug: opening and labeling lived on one path, so agent-opened PRs never
      # got the `auto` label and the @auto review loop never engaged on them.)
      # Gated to fresh issue runs (the inverse of the branch-sync gate): PR
      # follow-ups already have a PR. branch_name is the action's output for the
      # branch it pushed — empty when the run made no commits, so this no-ops.
      #
      # Token: prefer the machine-account PAT (MARVIN_TOKEN). It's a real GitHub
      # identity, so the PR it opens triggers CI and @review (the whole point);
      # and because it was passed to the action as github_token, the action did
      # NOT revoke it, so it's still live here. Two dead ends ruled this in:
      # steps.claude.outputs.github_token is the Claude App token, which the
      # action revokes inside its own composite step (gh → 401 here); and the
      # default GITHUB_TOKEN is barred from creating PRs where the org disables
      # Actions PR-creation, and even when allowed its PRs trigger no CI
      # (recursion guard). The `|| github.token` fallback only applies on repos
      # without the secret, where it degrades exactly as documented above.
      - name: Open or adopt PR for issue-triggered run
        id: openpr
        if: >-
          github.event.issue.pull_request == '' &&
          github.event.pull_request == '' &&
          steps.claude.outputs.branch_name != ''
        env:
          GH_TOKEN: ${{ secrets.MARVIN_TOKEN || github.token }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ steps.claude.outputs.branch_name }}
          # Empty on most repos (gh defaults --base to the repo default branch);
          # set on the fork, where base is pristine main, not the meridian default.
          BASE: ${{ inputs.base_branch }}
          ISSUE: ${{ github.event.issue.number }}
          # Label that opts a PR into the @auto loop; propagated from the issue.
          AUTO_LABEL: "auto"
          # The kickoff's trigger phrase — "@auto" for the autonomous kickoff job,
          # whether it fired from the `auto` label OR an `@auto` mention. Used to
          # label the PR even when the issue itself carries no `auto` label.
          TRIGGER_PHRASE: ${{ inputs.trigger_phrase }}
          REQ_REVIEW: ${{ inputs.request_review_after_open }}
        run: |
          set -euo pipefail
          # The branch lives on origin; the initial checkout predates the push.
          if ! git fetch --quiet origin "$BRANCH"; then
            echo "Branch $BRANCH not on origin; nothing to open."
            exit 0
          fi
          # Adopt the PR if the agent already opened one for this branch (fork /
          # multi-step tasks); otherwise open it ourselves. Both paths fall
          # through to the labeling below.
          pr_url="$(gh pr list --repo "$REPO" --head "$BRANCH" --state open --json url --jq '.[0].url // empty')"
          if [ -n "$pr_url" ]; then
            echo "PR already exists for $BRANCH ($pr_url); adopting it."
            opened=false
          else
            # Title/body from the latest commit (the agent writes descriptive,
            # conventional-commit messages); prefix the body with the issue link.
            title="$(git log -1 --format=%s FETCH_HEAD)"
            detail="$(git log -1 --format=%b FETCH_HEAD)"
            body="$(printf 'Fixes #%s\n\n%s' "$ISSUE" "$detail")"
            pr_url="$(gh pr create --repo "$REPO" --head "$BRANCH" ${BASE:+--base "$BASE"} \
              --title "$title" --body "$body")"
            opened=true
          fi
          # Label the PR `auto` so the @auto loop engages — whenever this is an
          # @auto run. That's true if the kickoff's trigger phrase is `@auto`
          # (fired by an `@auto` *mention*, even on an unlabeled issue) OR the
          # originating issue carries the `auto` label. The mention case was the
          # gap: "@auto please implement this" on an unlabeled issue opened an
          # unlabeled PR, so the review-fix loop never engaged (inspect_ai#71/#74).
          # Idempotent, and independent of who opened the PR — must run on the
          # adopt path too, or fork/agent-opened PRs never get labeled.
          if [ "$TRIGGER_PHRASE" = "@auto" ] \
             || gh issue view "$ISSUE" --repo "$REPO" --json labels --jq '.labels[].name' 2>/dev/null \
                  | grep -qx "$AUTO_LABEL"; then
            echo "@auto run; labeling $pr_url with '$AUTO_LABEL'."
            gh pr edit "$pr_url" --add-label "$AUTO_LABEL" || true
          fi
          # Start the reviewer — but only AFTER the label above, so the review-fix
          # loop sees an authorized (labeled) PR when the reviewer's summary lands.
          # Only where the caller opts in (the fork, where PR-open auto-review
          # doesn't fire); elsewhere that native trigger already covers it. Posted
          # as the machine account so it actually triggers the reviewer. This
          # replaces the agent posting @review from its prompt, which raced the
          # labeling above (see request_review_after_open).
          if [ "${REQ_REVIEW:-false}" = "true" ]; then
            echo "Requesting review on $pr_url (post-label)."
            gh pr comment "$pr_url" --repo "$REPO" --body '@review' || true
          fi
          # Surface the real PR link on the issue — only when WE opened it.
          # claude-code-action's own run summary only shows a prefilled "Create
          # PR" compare link (now stale) and never names the opened PR, so post
          # it explicitly. When the agent opened its own PR it already linked it,
          # so a second comment here would just be noise.
          if [ "$opened" = "true" ]; then
            gh issue comment "$ISSUE" --repo "$REPO" --body "$(printf \
              '✅ Opened a pull request for this issue: %s\n\n(The "Create PR ➔" link in the run summary above is superseded — the PR is already open.)' \
              "$pr_url")" || true
          fi
          # Expose the PR for the stage post-step: an @auto run that left a PR
          # in the loop stays Agent Working; one that didn't hands back.
          echo "url=$pr_url" >>"$GITHUB_OUTPUT"

      # Surface agent errors the action swallows. A model API error (overload /
      # 529, a model 404, etc.) leaves the run green at the workflow level but
      # with no result — and a stale "I'll get back to you" comment. Detect
      # is_error in the execution log (or a failed action step), post a visible
      # comment, and fail the job so the run isn't a misleading success.
      - name: Surface agent errors
        id: surface
        if: always()
        env:
          GH_TOKEN: ${{ secrets.MARVIN_TOKEN || github.token }}
          REPO: ${{ github.repository }}
          EXEC: ${{ steps.claude.outputs.execution_file }}
          CLAUDE_OUTCOME: ${{ steps.claude.outcome }}
          NUM: ${{ github.event.issue.number || github.event.pull_request.number }}
        run: |
          set -uo pipefail
          file="${EXEC:-/home/runner/work/_temp/claude-execution-output.json}"
          err=""
          [ -f "$file" ] && err=$(jq -r '(if type=="array" then . else .messages end) | map(select(.type=="result" and .is_error==true)) | last | .result // empty' "$file" 2>/dev/null || true)
          if [ -z "$err" ] && [ "$CLAUDE_OUTCOME" = "failure" ]; then
            err="the Claude Code step failed before producing a result (see the job logs)."
          fi
          [ -z "$err" ] && { echo "No agent error detected."; exit 0; }
          echo "::error::Claude run did not complete: $err"
          if [ -n "${NUM:-}" ]; then
            gh issue comment "$NUM" --repo "$REPO" --body "$(printf '⚠️ This Claude run did not complete — it errored before finishing:\n\n> %s\n\nUsually transient (model API capacity/overload or a model-availability blip). Re-trigger to retry; if it persists see https://status.claude.com.' "$err")" || true
          fi
          exit 1

      # Atlas tracking: the one-shot dev agent hands back to a human when it's
      # done — and an errored run also needs a human (the error comment asks
      # for a re-trigger) — so move to Human Review. The exception is a
      # SUCCESSFUL @auto run that left a PR in the loop (opened/adopted one, or
      # ran on a PR): the automated review loop owns the stage from there
      # (claude-auto-review.yml sets Human Review at its converged/escalated
      # handoff). always(): this must run after a failed claude step or a
      # failing Surface step — those are exactly the hand-back-to-human cases.
      - name: Stage - Human Review (hand-back)
        if: >-
          always() && steps.trig.outputs.ok == 'true' && !(
            inputs.trigger_phrase == '@auto' &&
            steps.claude.outcome == 'success' &&
            steps.surface.outcome == 'success' &&
            (github.event.issue.pull_request != '' ||
             github.event.pull_request != '' ||
             steps.openpr.outputs.url != '')
          )
        uses: meridianlabs-ai/agents/.github/actions/set-stage@main
        with:
          stage: Human Review
          token: ${{ secrets.MARVIN_TOKEN }}
          repo: ${{ github.repository }}
          issue: ${{ github.event.issue.number || github.event.pull_request.number }}

      - name: Upload execution log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-execution-output
          path: /home/runner/work/_temp/claude-execution-output.json
          if-no-files-found: ignore
