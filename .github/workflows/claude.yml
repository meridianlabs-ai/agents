name: Claude (reusable)

# Reusable workflow wrapping anthropics/claude-code-action.
# Caller repos add a thin stub (see examples/claude-stub.yml) and inherit
# all configuration from here, so trigger/config changes happen in one place.
#
# Auth uses Anthropic Workload Identity Federation: each run exchanges the
# GitHub OIDC token for a short-lived Anthropic credential scoped to the
# meridian service account/workspace. No secrets required — but callers MUST
# grant `id-token: write` at the calling job level (GitHub does not pass
# id-token to reusable workflows implicitly).
#
# Note: GitHub does not issue OIDC tokens to workflows triggered by PRs from
# forks, so fork PRs cannot authenticate. All triggers in the stub run in the
# base-repo context, so this only matters if a caller adds pull_request
# triggers of its own.

on:
  workflow_call:
    inputs:
      trigger_phrase:
        description: Comment phrase that triggers Claude
        required: false
        type: string
        default: "@claude"
      label_trigger:
        description: Issue label that triggers Claude
        required: false
        type: string
        default: "claude"
      claude_args:
        description: Additional CLI arguments passed through to Claude Code
        required: false
        type: string
        default: ""
      base_branch:
        description: >-
          Base branch for branches/PRs Claude creates (defaults to the repo's
          default branch). Used by the inspect_ai fork to target pristine main
          rather than the meridian default branch.
        required: false
        type: string
        default: ""

jobs:
  claude:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_federation_rule_id: fdrl_01GpNgJm9jE6ZfvcqoJYQL2Y
          anthropic_organization_id: 25a4c004-1d4f-4385-9e02-d56096cc07c4
          anthropic_service_account_id: svac_01RL4wYD7ikbypwYKf4wFojv
          anthropic_workspace_id: wrkspc_01RKCQ5DTPBatQ7kHLkaEueD
          trigger_phrase: ${{ inputs.trigger_phrase }}
          label_trigger: ${{ inputs.label_trigger }}
          base_branch: ${{ inputs.base_branch }}
          claude_args: ${{ inputs.claude_args }}
