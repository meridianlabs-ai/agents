name: Claude Auto Review (reusable)

# @auto Phase 2/3: the review -> fix loop and human handoff. A caller stub
# triggers this on `issue_comment` when the automated reviewer posts its marked
# summary comment on an `auto`-labeled PR. The dev agent (as the machine
# account) addresses the feedback, pushes, and re-requests review — closing the
# loop. When it finds nothing to fix, it hands off to a human (it NEVER merges).
# Bounded by review_round_cap; at the cap it drops the `auto` label (the
# kill-switch) and pings a human.
#
# Why issue_comment, not pull_request_review: pull_request_review resolves
# workflows from the PR's base branch, so it never fires on a pristine-base fork
# (the inspect_ai fork). issue_comment resolves from the default branch and
# fires everywhere — one mechanism for all repos. The reviewer marks its summary
# comment (<!-- claude-review-summary -->) so this keys on it; @auto then reads
# the actual review + inline findings via the API.
#
# Only the automated reviewer's comments drive the loop (reviewer_login); the
# `auto` label authorizes; cross-repo (fork) PRs are skipped (the agent checks
# out and runs PR head code under MARVIN_TOKEN — don't do that for untrusted
# forks). Shares the per-PR `concurrency` group with claude-auto.yml so the
# CI-fixer and review-fixer never push to the same branch at once.

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: string
      comment_author:
        description: Login that posted the triggering comment (github.event.comment.user.login).
        required: true
        type: string
      reviewer_login:
        description: Login of the automated reviewer whose marked summary comments drive the loop.
        required: false
        type: string
        default: "claude[bot]"
      auto_label:
        required: false
        type: string
        default: "auto"
      review_round_cap:
        description: Max review -> fix rounds before escalating to a human.
        required: false
        type: number
        default: 3
      model:
        required: false
        type: string
        default: "fable"
      fallback_model:
        required: false
        type: string
        default: "default"
      append_system_prompt:
        description: >-
          Repo-specific guidance (e.g. the fork's "a human promotes upstream
          rather than merging here" note for the handoff). Empty by default.
        required: false
        type: string
        default: ""
      settings:
        description: Keep in sync with claude.yml / claude-auto.yml.
        required: false
        type: string
        default: >-
          {"permissions":{"allow":["Read","Edit","Write",
          "Bash(pytest:*)","Bash(ruff:*)","Bash(mypy:*)","Bash(pyright:*)","Bash(pip:*)",
          "Bash(pip3:*)","Bash(uv:*)","Bash(python:*)","Bash(python3:*)",
          "Bash(gh:*)",
          "Bash(git fetch:*)","Bash(git merge:*)","Bash(git rebase:*)",
          "Bash(git push:*)","Bash(git checkout:*)","Bash(git switch:*)",
          "Bash(git branch:*)","Bash(git status:*)","Bash(git log:*)",
          "Bash(git diff:*)","Bash(git show:*)","Bash(git rev-parse:*)",
          "Bash(git remote:*)"]}}
    secrets:
      MARVIN_TOKEN:
        required: false

jobs:
  auto-review-fix:
    runs-on: ubuntu-latest
    # Same group as claude-auto.yml's CI-fixer (keyed on PR number): all @auto
    # pushes to a PR serialize, and the round counter's read-modify-write can't
    # race. cancel-in-progress: false lets an in-flight fix finish.
    concurrency:
      group: claude-auto-${{ github.repository }}-pr-${{ inputs.pr_number }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      # Gate (reviewer identity, same-repo, auto label, token) and compute the
      # round count — all via the API, before any checkout. The counter
      # increments before the agent runs, so a crashed agent still consumes a
      # round. Also derives the PR head branch (issue_comment doesn't carry it).
      - name: Gate and count
        id: gate
        env:
          GH_TOKEN: ${{ secrets.MARVIN_TOKEN || github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ inputs.pr_number }}
          AUTHOR: ${{ inputs.comment_author }}
          REVIEWER: ${{ inputs.reviewer_login }}
          AUTO_LABEL: ${{ inputs.auto_label }}
          CAP: ${{ inputs.review_round_cap }}
          HAS_TOKEN: ${{ secrets.MARVIN_TOKEN != '' }}
          MARKER: "<!-- auto-review-rounds -->"
        run: |
          set -euo pipefail
          act() { echo "act=$1" >>"$GITHUB_OUTPUT"; }
          echo "review-fix gate: pr=#$PR comment_author='$AUTHOR' reviewer_login='$REVIEWER'"
          if [ "$HAS_TOKEN" != "true" ]; then
            echo "No MARVIN_TOKEN; the review loop can't push/re-request as a real identity. Skipping."
            act skip; exit 0
          fi
          if [ "$AUTHOR" != "$REVIEWER" ]; then
            echo "Comment by '$AUTHOR', not the automated reviewer '$REVIEWER'; ignoring."
            act skip; exit 0
          fi
          pr_json=$(gh pr view "$PR" --repo "$REPO" --json headRefName,isCrossRepository,labels 2>/dev/null) || {
            echo "#$PR is not a pull request; skipping."; act skip; exit 0; }
          if [ "$(jq -r '.isCrossRepository' <<<"$pr_json")" = "true" ]; then
            echo "PR #$PR is from a fork (cross-repository); skipping — would run untrusted code under MARVIN_TOKEN."
            act skip; exit 0
          fi
          if [ "$(jq -r --arg l "$AUTO_LABEL" 'any(.labels[]; .name==$l)' <<<"$pr_json")" != "true" ]; then
            echo "PR #$PR is not @auto-labeled; skipping."; act skip; exit 0
          fi
          echo "head_branch=$(jq -r '.headRefName' <<<"$pr_json")" >>"$GITHUB_OUTPUT"
          cid=$(gh api "repos/$REPO/issues/$PR/comments" --paginate \
                  --jq 'map(select(.body|contains("'"$MARKER"'"))) | last | .id // empty')
          prev=0
          if [ -n "$cid" ]; then
            prev=$(gh api "repos/$REPO/issues/comments/$cid" --jq '.body' \
                     | sed -n 's/.*rounds:[[:space:]]*\([0-9]*\).*/\1/p')
            prev=${prev:-0}
          fi
          next=$((prev + 1))
          echo "cid=$cid" >>"$GITHUB_OUTPUT"
          echo "round=$next" >>"$GITHUB_OUTPUT"
          if [ "$next" -gt "$CAP" ]; then act escalate; else act fix; fi

      - name: Escalate to human
        if: steps.gate.outputs.act == 'escalate'
        env:
          GH_TOKEN: ${{ secrets.MARVIN_TOKEN || github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ inputs.pr_number }}
          AUTO_LABEL: ${{ inputs.auto_label }}
          CAP: ${{ inputs.review_round_cap }}
        run: |
          set -euo pipefail
          gh pr comment "$PR" --repo "$REPO" --body \
            "🤖 @auto: the reviewer still has feedback after $CAP review rounds and I haven't converged. Removing the \`$AUTO_LABEL\` label and handing this to a human. Re-add it to let me keep iterating."
          gh pr edit "$PR" --repo "$REPO" --remove-label "$AUTO_LABEL" || true

      # Check out the PR head (derived above); authenticate as the machine
      # account so the agent's fix push re-triggers CI and its `@review` comment
      # re-triggers the reviewer (a GITHUB_TOKEN push/comment would be dropped).
      - name: Check out PR branch
        if: steps.gate.outputs.act == 'fix'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.gate.outputs.head_branch }}
          token: ${{ secrets.MARVIN_TOKEN || github.token }}

      - name: Record round
        if: steps.gate.outputs.act == 'fix'
        env:
          GH_TOKEN: ${{ secrets.MARVIN_TOKEN || github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ inputs.pr_number }}
          CID: ${{ steps.gate.outputs.cid }}
          ROUND: ${{ steps.gate.outputs.round }}
          CAP: ${{ inputs.review_round_cap }}
          MARKER: "<!-- auto-review-rounds -->"
        run: |
          set -euo pipefail
          body="$MARKER
          🤖 @auto review rounds: $ROUND (cap $CAP)."
          if [ -n "$CID" ]; then
            gh api -X PATCH "repos/$REPO/issues/comments/$CID" -f body="$body" --silent
          else
            gh api -X POST "repos/$REPO/issues/$PR/comments" -f body="$body" --silent
          fi

      - name: Compose review-fix prompt
        if: steps.gate.outputs.act == 'fix'
        id: prompt
        env:
          REPO: ${{ github.repository }}
          PR: ${{ inputs.pr_number }}
          ROUND: ${{ steps.gate.outputs.round }}
          CAP: ${{ inputs.review_round_cap }}
        run: |
          printf 'value=%s\n' "You are @auto addressing automated-review feedback on PR #$PR in $REPO (review round $ROUND of $CAP). Read the reviewer's latest summary and any inline review comments with gh: \`gh pr view $PR --comments\`, \`gh api repos/$REPO/pulls/$PR/reviews\`, and \`gh api repos/$REPO/pulls/$PR/comments\`. Your goal is to leave the PR in the best shape you reasonably can, so address the feedback thoroughly — this INCLUDES minor and explicitly non-blocking suggestions (nits, naming, small refactors, reuse/DRY cleanups, doc fixes). Do NOT skip a suggestion just because the reviewer marked it non-blocking or 'not worth blocking on'; if it is a reasonable improvement, make it. The only items to leave unaddressed are ones you genuinely disagree with, that are clearly out of scope for this PR, or that are not a net improvement — for each of those, reply to that specific comment with a brief rationale instead of changing code. Verify your changes (run the relevant pytest/ruff/mypy). If you made any changes, commit and push to the current branch as the machine account (this re-runs CI), then post a single top-level comment of exactly \`@review\` to request re-review. Hand off to a human ONLY when nothing remains worth improving — i.e. the review is clean/approving, or every remaining suggestion is one you have deliberately declined with a posted rationale. To hand off: check CI with \`gh pr checks $PR\` and mergeability with \`gh pr view $PR --json mergeable,mergeStateStatus\`, then post ONE comment summarizing what you addressed and anything you intentionally declined (and why), with the current CI and mergeable status, and @-mention the PR's originating human (the author of the issue referenced by \"Fixes #<n>\" in the PR body, if any). Do NOT merge — @auto hands the final step to a human. Skip posting if an equivalent handoff comment already exists." >>"$GITHUB_OUTPUT"

      - uses: anthropics/claude-code-action@v1
        if: steps.gate.outputs.act == 'fix'
        id: claude
        with:
          anthropic_federation_rule_id: fdrl_01GpNgJm9jE6ZfvcqoJYQL2Y
          anthropic_organization_id: be5d0086-bc43-45d2-9184-20ecdd647aa7
          anthropic_service_account_id: svac_01RL4wYD7ikbypwYKf4wFojv
          anthropic_workspace_id: wrkspc_01RKCQ5DTPBatQ7kHLkaEueD
          github_token: ${{ secrets.MARVIN_TOKEN }}
          prompt: ${{ steps.prompt.outputs.value }}
          # The trigger actor is the reviewer bot, so lift claude-code-action's
          # default non-human-actor guard for that one bot (never '*'). The gate
          # above did the real authorization.
          allowed_bots: "claude"
          settings: ${{ inputs.settings }}
          claude_args: >-
            ${{ inputs.model != '' && format('--model {0}', inputs.model) || '' }}
            ${{ inputs.model != '' && inputs.fallback_model != '' && format('--fallback-model {0}', inputs.fallback_model) || '' }}
            ${{ inputs.append_system_prompt != '' && format('--append-system-prompt {0}', toJSON(inputs.append_system_prompt)) || '' }}

      - name: Upload execution log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-auto-review-execution-output
          path: /home/runner/work/_temp/claude-execution-output.json
          if-no-files-found: ignore
