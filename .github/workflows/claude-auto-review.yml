name: Claude Auto Review (reusable)

# @auto Phase 2/3: the review -> fix loop and human handoff. A caller stub
# triggers this on `issue_comment` when the automated reviewer posts its marked
# summary comment on an `auto`-labeled PR. The dev agent (as the machine
# account) addresses the feedback, pushes, and re-requests review — closing the
# loop. When it finds nothing to fix, it hands off to a human (it NEVER merges).
# Bounded by review_round_cap; at the cap it drops the `auto` label (the
# kill-switch) and pings a human.
#
# Why issue_comment, not pull_request_review: pull_request_review resolves
# workflows from the PR's base branch, so it never fires on a pristine-base fork
# (the inspect_ai fork). issue_comment resolves from the default branch and
# fires everywhere — one mechanism for all repos. The reviewer marks its summary
# comment (<!-- claude-review-summary -->) so this keys on it; @auto then reads
# the actual review + inline findings via the API.
#
# Only the automated reviewer's comments drive the loop (reviewer_login); the
# `auto` label authorizes; cross-repo (fork) PRs are skipped (the agent checks
# out and runs PR head code under MARVIN_TOKEN — don't do that for untrusted
# forks). Shares the per-PR `concurrency` group with claude-auto.yml so the
# CI-fixer and review-fixer never push to the same branch at once.

on:
  workflow_call:
    inputs:
      pr_number:
        required: true
        type: string
      comment_author:
        description: Login that posted the triggering comment (github.event.comment.user.login).
        required: true
        type: string
      reviewer_login:
        description: Login of the automated reviewer whose marked summary comments drive the loop.
        required: false
        type: string
        default: "claude[bot]"
      auto_label:
        required: false
        type: string
        default: "auto"
      review_round_cap:
        description: >-
          Max review -> fix rounds before escalating to a human. This is the
          hard ceiling on a *productive* loop; a separate no-progress check
          (below) escalates earlier if a fix round pushes no new commit.
        required: false
        type: number
        default: 7
      handoff_mention:
        description: >-
          GitHub login to @-mention on convergence/escalation handoff. Empty
          (default) derives the originating human from the PR's "Fixes/Closes
          #N" linked-issue author; bots are skipped.
        required: false
        type: string
        default: ""
      model:
        required: false
        type: string
        default: "fable"
      fallback_model:
        required: false
        type: string
        default: "default"
      append_system_prompt:
        description: >-
          Repo-specific guidance (e.g. the fork's "a human promotes upstream
          rather than merging here" note for the handoff). Empty by default.
        required: false
        type: string
        default: ""
      settings:
        description: Keep in sync with claude.yml / claude-auto.yml.
        required: false
        type: string
        default: >-
          {"permissions":{"allow":["Read","Edit","Write",
          "Bash(pytest:*)","Bash(ruff:*)","Bash(mypy:*)","Bash(pyright:*)","Bash(pip:*)",
          "Bash(pip3:*)","Bash(uv:*)","Bash(python:*)","Bash(python3:*)",
          "Bash(gh:*)",
          "Bash(git fetch:*)","Bash(git merge:*)","Bash(git rebase:*)",
          "Bash(git push:*)","Bash(git checkout:*)","Bash(git switch:*)",
          "Bash(git branch:*)","Bash(git status:*)","Bash(git log:*)",
          "Bash(git diff:*)","Bash(git show:*)","Bash(git rev-parse:*)",
          "Bash(git remote:*)",
          "Bash(git add:*)","Bash(git commit:*)","Bash(git config:*)"]}}
    secrets:
      MARVIN_TOKEN:
        required: false

jobs:
  auto-review-fix:
    runs-on: ubuntu-latest
    # Same group as claude-auto.yml's CI-fixer (keyed on PR number): all @auto
    # pushes to a PR serialize, and the round counter's read-modify-write can't
    # race. cancel-in-progress: false lets an in-flight fix finish.
    concurrency:
      group: claude-auto-${{ github.repository }}-pr-${{ inputs.pr_number }}
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      # Gate (reviewer identity, same-repo, auto label, token) and compute the
      # round count — all via the API, before any checkout. The counter
      # increments before the agent runs, so a crashed agent still consumes a
      # round. Also derives the PR head branch (issue_comment doesn't carry it).
      - name: Gate and count
        id: gate
        env:
          GH_TOKEN: ${{ secrets.MARVIN_TOKEN || github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ inputs.pr_number }}
          AUTHOR: ${{ inputs.comment_author }}
          REVIEWER: ${{ inputs.reviewer_login }}
          AUTO_LABEL: ${{ inputs.auto_label }}
          CAP: ${{ inputs.review_round_cap }}
          HANDOFF_MENTION: ${{ inputs.handoff_mention }}
          HAS_TOKEN: ${{ secrets.MARVIN_TOKEN != '' }}
          MARKER: "<!-- auto-review-rounds -->"
        run: |
          set -euo pipefail
          act() { echo "act=$1" >>"$GITHUB_OUTPUT"; }
          echo "review-fix gate: pr=#$PR comment_author='$AUTHOR' reviewer_login='$REVIEWER'"
          if [ "$HAS_TOKEN" != "true" ]; then
            echo "No MARVIN_TOKEN; the review loop can't push/re-request as a real identity. Skipping."
            act skip; exit 0
          fi
          if [ "$AUTHOR" != "$REVIEWER" ]; then
            echo "Comment by '$AUTHOR', not the automated reviewer '$REVIEWER'; ignoring."
            act skip; exit 0
          fi
          pr_json=$(gh pr view "$PR" --repo "$REPO" --json headRefName,headRefOid,isCrossRepository,labels 2>/dev/null) || {
            echo "#$PR is not a pull request; skipping."; act skip; exit 0; }
          if [ "$(jq -r '.isCrossRepository' <<<"$pr_json")" = "true" ]; then
            echo "PR #$PR is from a fork (cross-repository); skipping — would run untrusted code under MARVIN_TOKEN."
            act skip; exit 0
          fi
          if [ "$(jq -r --arg l "$AUTO_LABEL" 'any(.labels[]; .name==$l)' <<<"$pr_json")" != "true" ]; then
            echo "PR #$PR is not @auto-labeled; skipping."; act skip; exit 0
          fi
          echo "head_branch=$(jq -r '.headRefName' <<<"$pr_json")" >>"$GITHUB_OUTPUT"

          # Human to @-mention on handoff/escalation: the author of the issue this
          # PR closes (Fixes/Closes/Resolves #N), unless overridden. Bots are
          # skipped — no point pinging the PR's own machine-account author.
          mention="$HANDOFF_MENTION"
          if [ -z "$mention" ]; then
            # Match both `Fixes #N` and the fully-qualified `Fixes owner/repo#N`
            # (the fork mandates the latter — a bare `#N` there silently rebinds
            # to upstream when the branch is promoted). Only resolve a mention
            # when the reference targets THIS repo: a cross-repo `owner/repo#N`
            # points at a different tracker, so its number is meaningless here.
            ref=$(gh pr view "$PR" --repo "$REPO" --json body --jq '.body // ""' \
                    | grep -ioE '(fixes|closes|resolves)[[:space:]]+([-A-Za-z0-9._]+/[-A-Za-z0-9._]+)?#[0-9]+' \
                    | head -1 || true)
            inum=""
            if [ -n "$ref" ]; then
              refrepo=$(printf '%s' "$ref" | grep -oiE '[-A-Za-z0-9._]+/[-A-Za-z0-9._]+' || true)
              if [ -z "$refrepo" ] || \
                 [ "$(printf '%s' "$refrepo" | tr '[:upper:]' '[:lower:]')" = "$(printf '%s' "$REPO" | tr '[:upper:]' '[:lower:]')" ]; then
                inum=$(printf '%s' "$ref" | sed -n 's/.*#\([0-9]\{1,\}\).*/\1/p')
              fi
            fi
            if [ -n "$inum" ]; then
              mention=$(gh api "repos/$REPO/issues/$inum" \
                          --jq 'if .user.type=="Bot" then "" else .user.login end' 2>/dev/null || true)
            fi
          fi
          echo "mention=$mention" >>"$GITHUB_OUTPUT"

          # Deterministic convergence: if the reviewer's latest summary carries a
          # `clean` verdict (no outstanding suggestions), hand off to a human
          # without spending a fix round. An absent verdict (older reviewer, or a
          # caller that overrides review_prompt) falls through to the round-count
          # path below, preserving prior behavior.
          verdict=$(gh api "repos/$REPO/issues/$PR/comments" --paginate \
                      --jq 'map(select(.body|contains("claude-review-summary"))) | last | .body' \
                    | sed -n 's/.*claude-review-verdict:\([a-z]*\).*/\1/p')
          if [ "$verdict" = "clean" ]; then
            echo "Reviewer verdict is clean; converging without a fix round."
            act converged; exit 0
          fi

          cid=$(gh api "repos/$REPO/issues/$PR/comments" --paginate \
                  --jq 'map(select(.body|contains("'"$MARKER"'"))) | last | .id // empty')
          prev=0
          prevsha=""
          if [ -n "$cid" ]; then
            mbody=$(gh api "repos/$REPO/issues/comments/$cid" --jq '.body')
            prev=$(printf '%s' "$mbody" | sed -n 's/.*rounds:[[:space:]]*\([0-9]*\).*/\1/p')
            prev=${prev:-0}
            # Branch tip recorded when the previous round started (see Record round).
            prevsha=$(printf '%s' "$mbody" | sed -n 's/.*auto-review-head:\([0-9a-f]*\).*/\1/p')
          fi
          next=$((prev + 1))
          head=$(jq -r '.headRefOid' <<<"$pr_json")
          echo "cid=$cid" >>"$GITHUB_OUTPUT"
          echo "round=$next" >>"$GITHUB_OUTPUT"
          echo "head=$head" >>"$GITHUB_OUTPUT"

          # No-progress escalation: the previous fix round pushed no new commit
          # (branch tip unchanged since it was recorded) yet the reviewer still
          # has suggestions. Re-running the agent against an unchanged tree would
          # just repeat itself, so hand off early rather than burning rounds up
          # to the cap. Only meaningful once a prior round recorded a tip; a
          # marker without one (pre-upgrade) skips the check and falls through.
          if [ "$prev" -ge 1 ] && [ -n "$prevsha" ] && [ "$head" = "$prevsha" ]; then
            echo "No new commit since round $prev (tip $head unchanged); escalating for no progress."
            echo "stalled=1" >>"$GITHUB_OUTPUT"
            act escalate; exit 0
          fi
          if [ "$next" -gt "$CAP" ]; then act escalate; else act fix; fi

      # Reviewer reported no outstanding suggestions: hand off to a human for the
      # final review/merge (@auto never merges). Idempotent so a later clean
      # re-review doesn't re-ping. The `auto` label is left on, so further CI or
      # human-review activity can still re-engage @auto.
      - name: Converged handoff
        if: steps.gate.outputs.act == 'converged'
        env:
          GH_TOKEN: ${{ secrets.MARVIN_TOKEN || github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ inputs.pr_number }}
          MENTION: ${{ steps.gate.outputs.mention }}
          MARKER: "<!-- auto-converged -->"
        run: |
          set -euo pipefail
          if gh api "repos/$REPO/issues/$PR/comments" --paginate \
               --jq 'any(.[]; .body|contains("'"$MARKER"'"))' | grep -q true; then
            echo "Handoff already posted; skipping."; exit 0
          fi
          ping=""; [ -n "$MENTION" ] && ping="@$MENTION "
          gh pr comment "$PR" --repo "$REPO" --body "$MARKER
          ${ping}🤖 auto: the reviewer has no outstanding feedback — this PR has converged. auto never takes the final step (merge, or upstream promotion on the fork), so it's yours now; see the checks above for CI status. The \`auto\` label is left on, so auto will still react to new review or CI activity; remove it to disengage."

      - name: Escalate to human
        if: steps.gate.outputs.act == 'escalate'
        env:
          GH_TOKEN: ${{ secrets.MARVIN_TOKEN || github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ inputs.pr_number }}
          AUTO_LABEL: ${{ inputs.auto_label }}
          CAP: ${{ inputs.review_round_cap }}
          MENTION: ${{ steps.gate.outputs.mention }}
          STALLED: ${{ steps.gate.outputs.stalled }}
        run: |
          set -euo pipefail
          ping=""; [ -n "$MENTION" ] && ping="@$MENTION "
          if [ "${STALLED:-}" = "1" ]; then
            reason="my last fix round pushed no new changes, so I'm not making progress on the reviewer's remaining feedback"
          else
            reason="the reviewer still has feedback after $CAP review rounds and I haven't converged"
          fi
          gh pr comment "$PR" --repo "$REPO" --body \
            "${ping}🤖 auto: $reason. Removing the \`$AUTO_LABEL\` label and handing this to a human. Re-add it to let me keep iterating."
          gh pr edit "$PR" --repo "$REPO" --remove-label "$AUTO_LABEL" || true

      # Check out the PR head (derived above); authenticate as the machine
      # account so the agent's fix push re-triggers CI and its `@review` comment
      # re-triggers the reviewer (a GITHUB_TOKEN push/comment would be dropped).
      - name: Check out PR branch
        if: steps.gate.outputs.act == 'fix'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.gate.outputs.head_branch }}
          token: ${{ secrets.MARVIN_TOKEN || github.token }}

      # Capture the branch tip before the agent runs so the error-surfacing step
      # can tell whether the agent's work actually landed on the branch.
      - name: Record base SHA
        if: steps.gate.outputs.act == 'fix'
        id: base
        run: echo "sha=$(git rev-parse HEAD)" >>"$GITHUB_OUTPUT"

      - name: Record round
        if: steps.gate.outputs.act == 'fix'
        env:
          GH_TOKEN: ${{ secrets.MARVIN_TOKEN || github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ inputs.pr_number }}
          CID: ${{ steps.gate.outputs.cid }}
          ROUND: ${{ steps.gate.outputs.round }}
          CAP: ${{ inputs.review_round_cap }}
          HEAD: ${{ steps.gate.outputs.head }}
          MARKER: "<!-- auto-review-rounds -->"
        run: |
          set -euo pipefail
          # The auto-review-head marker records the branch tip at the START of
          # this round; next round's gate compares against it to detect a fix
          # round that pushed nothing (no-progress escalation).
          body="$MARKER
          🤖 auto review rounds: $ROUND (cap $CAP).
          <!-- auto-review-head:$HEAD -->"
          if [ -n "$CID" ]; then
            gh api -X PATCH "repos/$REPO/issues/comments/$CID" -f body="$body" --silent
          else
            gh api -X POST "repos/$REPO/issues/$PR/comments" -f body="$body" --silent
          fi

      - name: Compose review-fix prompt
        if: steps.gate.outputs.act == 'fix'
        id: prompt
        env:
          REPO: ${{ github.repository }}
          PR: ${{ inputs.pr_number }}
          ROUND: ${{ steps.gate.outputs.round }}
          CAP: ${{ inputs.review_round_cap }}
        run: |
          printf 'value=%s\n' "You are @auto addressing automated-review feedback on PR #$PR in $REPO (review round $ROUND of $CAP). Read the reviewer's latest summary and any inline review comments with gh: \`gh pr view $PR --comments\`, \`gh api repos/$REPO/pulls/$PR/reviews\`, and \`gh api repos/$REPO/pulls/$PR/comments\`. Your goal is to leave the PR in the best shape you reasonably can, so address the feedback thoroughly — this INCLUDES minor and explicitly non-blocking suggestions (nits, naming, small refactors, reuse/DRY cleanups, doc fixes). Do NOT skip a suggestion just because the reviewer marked it non-blocking or 'not worth blocking on'; if it is a reasonable improvement, make it. The only items to leave unaddressed are ones you genuinely disagree with, that are clearly out of scope for this PR, or that are not a net improvement — for each of those, reply to that specific comment with a brief rationale instead of changing code. Verify your changes (run the relevant pytest/ruff/mypy). If you made any changes, commit and push to the current branch as the machine account (this re-runs CI), then post a single top-level comment of exactly \`@review\` to request re-review. After pushing, resolve the inline review threads you fully addressed in code, so settled feedback is visibly closed: list threads via \`gh api graphql\` (query \`repository.pullRequest.reviewThreads\` — each node has an \`id\`, \`isResolved\`, and its \`comments\`), then for each thread you resolved in code run the \`resolveReviewThread\` mutation, e.g. \`gh api graphql -f query='mutation(\$id:ID!){resolveReviewThread(input:{threadId:\$id}){thread{isResolved}}}' -F id=<threadId>\`. Leave UNRESOLVED any thread you deliberately declined (the one you replied to with a rationale) so a human can adjudicate it, and never resolve a thread you did not actually address. Hand off to a human ONLY when nothing remains worth improving — i.e. the review is clean/approving, or every remaining suggestion is one you have deliberately declined with a posted rationale. To hand off: check CI with \`gh pr checks $PR\` and mergeability with \`gh pr view $PR --json mergeable,mergeStateStatus\`, then post ONE comment summarizing what you addressed and anything you intentionally declined (and why), with the current CI and mergeable status, and @-mention the PR's originating human (the author of the issue referenced by \"Fixes #<n>\" in the PR body, if any). Do NOT merge — auto hands the final step to a human. In any comment you post here, refer to this automation as \`auto\` without an @ prefix; a literal @auto would re-trigger the loop. Skip posting if an equivalent handoff comment already exists." >>"$GITHUB_OUTPUT"

      - uses: anthropics/claude-code-action@v1
        if: steps.gate.outputs.act == 'fix'
        id: claude
        with:
          anthropic_federation_rule_id: fdrl_01GpNgJm9jE6ZfvcqoJYQL2Y
          anthropic_organization_id: be5d0086-bc43-45d2-9184-20ecdd647aa7
          anthropic_service_account_id: svac_01RL4wYD7ikbypwYKf4wFojv
          anthropic_workspace_id: wrkspc_01RKCQ5DTPBatQ7kHLkaEueD
          github_token: ${{ secrets.MARVIN_TOKEN }}
          prompt: ${{ steps.prompt.outputs.value }}
          # The trigger actor is the reviewer bot, so lift claude-code-action's
          # default non-human-actor guard for that one bot (never '*'). The gate
          # above did the real authorization.
          allowed_bots: "claude"
          settings: ${{ inputs.settings }}
          claude_args: >-
            ${{ inputs.model != '' && format('--model {0}', inputs.model) || '' }}
            ${{ inputs.model != '' && inputs.fallback_model != '' && format('--fallback-model {0}', inputs.fallback_model) || '' }}
            ${{ inputs.append_system_prompt != '' && format('--append-system-prompt {0}', toJSON(inputs.append_system_prompt)) || '' }}

      # Surface agent errors the action swallows (model overload/529, 404, etc.),
      # which otherwise leave the review-fix run green with no fix/handoff posted.
      # Also catches the "completed-but-blocked" case: the agent finishes with no
      # error but left its work unlanded (see the landed/pending check below).
      - name: Surface agent errors
        if: always() && steps.gate.outputs.act == 'fix'
        env:
          GH_TOKEN: ${{ secrets.MARVIN_TOKEN || github.token }}
          REPO: ${{ github.repository }}
          EXEC: ${{ steps.claude.outputs.execution_file }}
          CLAUDE_OUTCOME: ${{ steps.claude.outcome }}
          NUM: ${{ inputs.pr_number }}
          HEAD_BRANCH: ${{ steps.gate.outputs.head_branch }}
          BASE_SHA: ${{ steps.base.outputs.sha }}
        run: |
          set -uo pipefail
          file="${EXEC:-/home/runner/work/_temp/claude-execution-output.json}"
          err=""
          [ -f "$file" ] && err=$(jq -r '(if type=="array" then . else .messages end) | map(select(.type=="result" and .is_error==true)) | last | .result // empty' "$file" 2>/dev/null || true)
          if [ -z "$err" ] && [ "$CLAUDE_OUTCOME" = "failure" ]; then
            err="the review-fix step failed before producing a result (see the job logs)."
          fi
          # Completed-but-blocked: the action reports success, but the agent did
          # work that never reached the branch — uncommitted edits or local
          # commits it couldn't push (e.g. a git command outside the allow-list).
          # A healthy round either lands its changes (commit+push, or a
          # server-side API commit — both advance the remote tip) or makes no
          # changes at all, so unlanded local work means the round silently
          # stalled and nothing reached the PR. See design/auto-agent.md.
          if [ -z "$err" ] && [ -n "${BASE_SHA:-}" ]; then
            git fetch origin "$HEAD_BRANCH" --quiet 2>/dev/null || true
            remote=$(git rev-parse "origin/$HEAD_BRANCH" 2>/dev/null || echo "$BASE_SHA")
            pending=""
            [ -n "$(git status --porcelain 2>/dev/null || true)" ] && pending=1
            [ -n "$(git rev-list "$BASE_SHA..HEAD" 2>/dev/null || true)" ] && pending=1
            if [ "$remote" = "$BASE_SHA" ] && [ -n "$pending" ]; then
              summary=$(jq -r '(if type=="array" then . else .messages end) | map(select(.type=="result")) | last | .result // empty' "$file" 2>/dev/null | head -c 1000 || true)
              err="the agent finished but left changes it never landed on the branch (uncommitted edits or unpushed commits), so no fix reached the PR and no @review/handoff was posted.${summary:+ The agent's own summary: $summary}"
            fi
          fi
          [ -z "$err" ] && { echo "No agent error detected."; exit 0; }
          echo "::error::review-fix run did not complete: $err"
          if [ -n "${NUM:-}" ]; then
            gh issue comment "$NUM" --repo "$REPO" --body "$(printf '⚠️ The auto review-fix run did not complete:\n\n> %s\n\nIf this looks transient (model API capacity/overload), re-trigger with @review; otherwise it likely needs a human.' "$err")" || true
          fi
          exit 1

      - name: Upload execution log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-auto-review-execution-output
          path: /home/runner/work/_temp/claude-execution-output.json
          if-no-files-found: ignore
